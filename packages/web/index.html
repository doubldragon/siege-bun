<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege</title>
    <script>
      const t = localStorage.getItem('siege-theme');
      if (!t || JSON.parse(t).state?.isDark !== false) document.documentElement.classList.add('dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
